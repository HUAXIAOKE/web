server {
    listen 80;
    server_name huaxiaoke.com www.huaxiaoke.com;

    root /usr/share/nginx/html;
    index index.html;

    # Astro 静态页面
    location / {
        try_files $uri $uri/ =404;
    }

    # 后端 API（Go 服务 :1037）
    location /api/ {
        proxy_pass http://backend:1037;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 上传文件代理
    location /joinus_uploads/ {
        proxy_pass http://backend:1037;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 管理后台
    location /admin/ {
        proxy_pass http://backend:1037;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 静态资源代理（图片、音频）
    location /img/ {
        proxy_pass http://backend:1037;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /audio/ {
        proxy_pass http://backend:1037;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    client_max_body_size 200M;
}
