<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>华小科Web · 后台管理</title>
		<link rel="icon" type="image/x-icon" href="icon.ico" />
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="login-wrap" id="login-page">
			<div class="login-box">
				<h1>华小科 Web</h1>
				<p>后台管理系统</p>
				<input id="login-user" placeholder="账号" autocomplete="username" />
				<input id="login-pass" type="password" placeholder="密码" autocomplete="current-password" />
				<button class="btn-login" onclick="doLogin()">登 录</button>
				<div class="login-error" id="login-error"></div>
			</div>
		</div>

		<div class="app" id="app-page" style="display: none">
			<button class="sidebar-toggle" id="sidebar-toggle" aria-label="打开菜单" onclick="toggleSidebar()">
				<span></span><span></span><span></span>
			</button>
			<div class="sidebar-mask" id="sidebar-mask" onclick="toggleSidebar(false)"></div>
			<aside class="sidebar" id="sidebar">
				<div class="sidebar-logo">华小科 Web</div>
				<nav>
					<a class="active" data-tab="activity">活动列表</a>
					<a data-tab="timeline">心路历程</a>
					<a data-tab="gallery">插画展示</a>
					<a data-tab="about">关于我们</a>
					<a data-tab="music">增添音乐</a>
					<a data-tab="bilibili">B站绑定</a>
				</nav>
				<div class="sidebar-footer">
					<button class="btn-logout" onclick="doLogout()">退出登录</button>
				</div>
			</aside>

			<main class="main" id="main-content"></main>
		</div>

		<div class="modal-mask" id="modal-mask">
			<div class="modal">
				<div class="modal-header">
					<h3 id="modal-title">编辑</h3>
					<button class="modal-close" onclick="closeModal()">&times;</button>
				</div>
				<div class="modal-body" id="modal-body"></div>
				<div class="modal-footer">
					<button class="btn btn-ghost" onclick="closeModal()">取消</button>
					<button class="btn btn-primary" id="modal-save">保存</button>
				</div>
			</div>
		</div>

		<div class="toast" id="toast"></div>

		<script>
			const API = '';
			let token = localStorage.getItem('hxk_token') || '';

			function authHeaders() {
				return { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token };
			}
			function authFetch(url, opts = {}) {
				opts.headers = { ...opts.headers, Authorization: 'Bearer ' + token };
				return fetch(API + url, opts).then((res) => {
					if (res.status === 401) {
						doLogout();
					}
					return res;
				});
			}

			async function doLogin() {
				const user = document.getElementById('login-user').value.trim();
				const pass = document.getElementById('login-pass').value;
				const errEl = document.getElementById('login-error');
				errEl.textContent = '';
				try {
					const res = await fetch(API + '/api/login', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({ username: user, password: pass }),
					});
					if (!res.ok) {
						errEl.textContent = '账号或密码错误';
						return;
					}
					const data = await res.json();
					token = data.token;
					localStorage.setItem('hxk_token', token);
					showApp();
				} catch (e) {
					errEl.textContent = '网络错误';
				}
			}

			function doLogout() {
				token = '';
				localStorage.removeItem('hxk_token');
				document.getElementById('app-page').style.display = 'none';
				document.getElementById('login-page').style.display = '';
			}

			async function checkAuth() {
				if (!token) return false;
				try {
					const res = await fetch(API + '/api/auth/verify', { headers: { Authorization: 'Bearer ' + token } });
					if (res.status === 401) {
						doLogout();
						return false;
					}
					return res.ok;
				} catch (e) {
					return false;
				}
			}

			async function initApp() {
				if (await checkAuth()) {
					showApp();
				} else {
					doLogout();
				}
			}

			function showApp() {
				document.getElementById('login-page').style.display = 'none';
				document.getElementById('app-page').style.display = '';
				loadActivity();
			}

			document.getElementById('login-pass').addEventListener('keydown', (e) => {
				if (e.key === 'Enter') doLogin();
			});

			function toast(msg, type = 'success') {
				const el = document.getElementById('toast');
				el.textContent = msg;
				el.className = 'toast ' + type + ' show';
				setTimeout(() => el.classList.remove('show'), 2000);
			}

			function openModal(title, html, onSave, dropZones) {
				document.getElementById('modal-title').textContent = title;
				document.getElementById('modal-body').innerHTML = html;
				document.getElementById('modal-mask').classList.add('show');
				document.getElementById('modal-save').onclick = onSave;
				if (dropZones) dropZones.forEach((z) => initDropZone(z.id, z.dir));
			}
			function closeModal() {
				document.getElementById('modal-mask').classList.remove('show');
				const saveBtn = document.getElementById('modal-save');
				if (saveBtn) saveBtn.textContent = '保存';
				var footer = document.querySelector('.modal-footer');
				if (footer) footer.style.display = '';
			}
			document.getElementById('modal-mask').addEventListener('click', (e) => {
				if (e.target === e.currentTarget) closeModal();
			});

			function fileUploadHTML(fieldId, currentUrl, dir, opts = {}) {
				const accept = opts.accept || 'image/*';
				const label = opts.label || '文件';
				const isAudio = accept.includes('audio');
				const placeholder = isAudio ? '/audio/...' : '/img/...';
				const hint = '点击或拖拽文件到此区域上传';
				const previewTag = isAudio
					? `<audio controls id="${fieldId}_preview" src="${currentUrl || ''}" style="${currentUrl ? 'display:block' : 'display:none'};width:100%;margin-top:8px"></audio>`
					: `<img class="img-preview" id="${fieldId}_preview" src="${currentUrl || ''}" style="${currentUrl ? 'display:block' : 'display:none'}">`;

				return `<div class="form-group"><label>${label}</label>
						<input type="hidden" id="${fieldId}" value="${currentUrl || ''}">
						<div class="img-upload-area" id="${fieldId}_drop"
						onclick="document.getElementById('${fieldId}_file').click()">${hint}</div>
						<input type="file" id="${fieldId}_file" accept="${accept}" style="display:none"
						onchange="doUpload(this.files[0],'${fieldId}','${dir}')">
						<input type="text" id="${fieldId}_path" value="${currentUrl || ''}" placeholder="${placeholder}" style="margin-top:8px"
						oninput="onPathInput('${fieldId}',this.value)">
						${previewTag}</div>`;
			}
			function imgUploadHTML(fid, url, dir) {
				return fileUploadHTML(fid, url, dir, { accept: 'image/*', label: '图片' });
			}
			function audioUploadHTML(fid, url, dir) {
				return fileUploadHTML(fid, url, dir, { accept: 'audio/*', label: '音频' });
			}

			function onPathInput(fieldId, value) {
				document.getElementById(fieldId).value = value;
				const preview = document.getElementById(fieldId + '_preview');
				if (preview) {
					if (preview.tagName === 'IMG') {
						preview.src = value;
						preview.style.display = value ? 'block' : 'none';
					} else if (preview.tagName === 'AUDIO') {
						preview.src = value;
						preview.style.display = value ? 'block' : 'none';
					}
				}
			}

			function initDropZone(fieldId, dir) {
				const zone = document.getElementById(fieldId + '_drop');
				if (!zone) return;
				zone.addEventListener('dragover', (e) => {
					e.preventDefault();
					zone.classList.add('drag-over');
				});
				zone.addEventListener('dragleave', () => {
					zone.classList.remove('drag-over');
				});
				zone.addEventListener('drop', (e) => {
					e.preventDefault();
					zone.classList.remove('drag-over');
					const file = e.dataTransfer.files[0];
					if (file) doUpload(file, fieldId, dir);
				});
			}

			async function doUpload(file, fieldId, dir) {
				if (!file) return;
				const fd = new FormData();
				fd.append('file', file);
				fd.append('dir', dir);
				const zone = document.getElementById(fieldId + '_drop');
				if (zone) {
					zone.textContent = '上传中...';
					zone.classList.add('uploading');
				}
				try {
					const res = await authFetch('/api/upload', { method: 'POST', body: fd });
					if (!res.ok) throw new Error(await res.text());
					const data = await res.json();
					document.getElementById(fieldId).value = data.url;
					document.getElementById(fieldId + '_path').value = data.url;
					const preview = document.getElementById(fieldId + '_preview');
					if (preview) {
						preview.src = data.url;
						preview.style.display = 'block';
					}
					if (zone) {
						zone.textContent = '上传成功，点击或拖拽替换';
						zone.classList.remove('uploading');
					}
					toast('上传成功');
				} catch (e) {
					if (zone) {
						zone.textContent = '上传失败，点击或拖拽重试';
						zone.classList.remove('uploading');
					}
					toast('上传失败: ' + e.message, 'error');
				}
			}

			function val(id) {
				return document.getElementById(id)?.value?.trim() || '';
			}

			async function loadActivity() {
				const res = await authFetch('/api/activities');
				const list = await res.json();
				const main = document.getElementById('main-content');
				if (!list || list.length === 0) {
					main.innerHTML = `<div class="page-header"><h2>当期活动</h2><button class="btn btn-primary" onclick="editActivity()">+ 新增</button></div><div class="empty"><p>暂无活动数据</p></div>`;
					return;
				}
				const statusLabels = { active: '报名中', not_started: '未开放', expired: '已结束', not_enabled: '' };
				const statusClasses = { active: 'active', not_started: 'not-started', expired: 'expired', not_enabled: '' };
				main.innerHTML = `<div class="page-header"><h2>当期活动</h2><button class="btn btn-primary" onclick="editActivity()">+ 新增</button></div>
									<div class="card-grid">${list
										.map(
											(a) => `<div class="card">
									<img class="card-img" src="${a.image}" onerror="this.style.display='none'">
									<div class="card-body">
										<div class="meta">${a.tags
											.split(',')
											.map((t) => `<span class="tag">${t}</span>`)
											.join('')}<span class="card-date">${a.date}</span></div>
										<h3>${a.headline}</h3><p>${a.excerpt}</p>
										${a.signupStatus && statusLabels[a.signupStatus] ? `<span class="signup-badge ${statusClasses[a.signupStatus]}">${statusLabels[a.signupStatus]}</span>` : ''}
									</div>
									<div class="card-actions">
										<button class="btn btn-ghost" onclick='editActivity(${JSON.stringify(a)})'>编辑</button>
										${a.isSignup ?
											`<button class="btn btn-danger" onclick="setSignup(${a.id},0)">关闭报名</button>` :
											`<button class="btn btn-ghost" onclick="setSignup(${a.id},1)">开启报名</button>`
										}
										<button class="btn btn-ghost" onclick="openActivityConfig(${a.id})">配置</button>
										<button class="btn btn-danger" onclick="delActivity(${a.id})">删除</button>
									</div></div>`
										)
										.join('')}</div>`;
			}

			function editActivity(a) {
				const isNew = !a;
				a = a || { tags: '', date: '', image: '', headline: '', excerpt: '', href: '#', isSignup: 0, signupStart: '', signupEnd: '' };
				const ct = a.tags ? a.tags.split(',') : [];
				openModal(
					isNew ? '新增活动' : '编辑活动',
					`
					<div class="form-group"><label>标签</label><div class="checkbox-group">
					<label><input type="checkbox" class="f_tags" value="线上" ${ct.includes('线上') ? 'checked' : ''}> 线上</label>
					<label><input type="checkbox" class="f_tags" value="线下" ${ct.includes('线下') ? 'checked' : ''}> 线下</label>
					<label><input type="checkbox" class="f_tags" value="联动" ${ct.includes('联动') ? 'checked' : ''}> 联动</label>
					</div></div>
					<div class="form-group"><label>日期</label><input type="date" id="f_date" value="${a.date}"></div>
					<div class="form-group"><label>标题</label><input id="f_headline" value="${a.headline}"></div>
					<div class="form-group"><label>摘要</label><textarea id="f_excerpt">${a.excerpt}</textarea></div>
					<div class="form-group"><label>链接 (填外部链接则跳过详情页)</label><input id="f_href" value="${a.href}"></div>
					<div class="form-group"><label>报名开始时间 (可选)</label><input type="datetime-local" id="f_signupStart" value="${a.signupStart || ''}"></div>
					<div class="form-group"><label>报名结束时间 (可选)</label><input type="datetime-local" id="f_signupEnd" value="${a.signupEnd || ''}"></div>
					${imgUploadHTML('f_image', a.image, 'img/activity')}`,
					async () => {
						const tags = Array.from(document.querySelectorAll('.f_tags:checked'))
							.map((c) => c.value)
							.join(',');
						const body = {
							tags,
							date: val('f_date'),
							image: val('f_image'),
							headline: val('f_headline'),
							excerpt: val('f_excerpt'),
							href: val('f_href'),
							isSignup: a.isSignup || 0,
							signupStart: val('f_signupStart'),
							signupEnd: val('f_signupEnd'),
						};
						const res = await authFetch(isNew ? '/api/activities' : '/api/activities/' + a.id, {
							method: isNew ? 'POST' : 'PUT',
							headers: authHeaders(),
							body: JSON.stringify(body),
						});
						if (!res.ok) {
							toast('操作失败', 'error');
							return;
						}
						closeModal();
						toast(isNew ? '创建成功' : '保存成功');
						loadActivity();
					},
					[{ id: 'f_image', dir: 'img/activity' }]
				);
			}

			async function delActivity(id) {
				if (!confirm('确定删除？')) return;
				const res = await authFetch('/api/activities/' + id, { method: 'DELETE', headers: authHeaders() });
				if (!res.ok) {
					toast('删除失败', 'error');
					return;
				}
				toast('已删除');
				loadActivity();
			}

			async function setSignup(id, isSignup) {
				const action = isSignup ? '开启报名' : '关闭报名';
				const res = await authFetch('/api/activity/' + id + '/set-signup', {
					method: 'POST',
					headers: authHeaders(),
					body: JSON.stringify({ isSignup }),
				});
				if (!res.ok) {
					toast(action + '失败', 'error');
					return;
				}
				toast(action + '成功');
				loadActivity();
			}

			async function openActivityConfig(id) {
				const [detailRes, formRes] = await Promise.all([
					authFetch('/api/activity/' + id + '/detail'),
					authFetch('/api/activity/' + id + '/signup-form'),
				]);
				const detail = await detailRes.json();
				const form = await formRes.json();
				const main = document.getElementById('main-content');
				main.innerHTML = `
					<div class="page-header"><h2>活动配置</h2><button class="btn btn-ghost" onclick="loadActivity()">返回活动列表</button></div>
					<div class="config-grid">
						<div class="config-panel">
							<h3>详情内容</h3>
							<textarea id="config_detail_content" class="config-textarea tall">${detail.content || ''}</textarea>
							<p class="config-hint">支持 HTML 标签</p>
							<button class="btn btn-primary" onclick="saveDetail(${id})">保存详情</button>
						</div>
						<div class="config-panel">
							<h3>递交须知</h3>
							<textarea id="config_instructions" class="config-textarea short">${form.instructions || ''}</textarea>
							<p class="config-hint">支持 HTML 标签</p>
							<div class="checkbox-group" style="margin-top:12px">
								<label><input type="checkbox" id="config_attachment" ${form.attachment ? 'checked' : ''}> 需要附件</label>
							</div>
							<div class="form-group"><label>表单字段配置 (JSON)</label>
							<textarea id="config_fields" class="config-textarea mid">${form.fields || '[]'}</textarea></div>
							<button class="btn btn-primary" onclick="saveFormConfig(${id})">保存表单配置</button>
						</div>
					</div>
					<div class="config-section">
						<h3>报名数据</h3>
						<div class="config-toolbar">
							<button class="btn btn-ghost" onclick="loadSubmissions(${id})">刷新</button>
							<a class="btn btn-ghost" href="/api/activity/${id}/submissions/export" target="_blank">打包下载附件</a>
						</div>
						<div id="submissions_list"><p class="config-empty">点击刷新加载数据</p></div>
					</div>`;
			}

			async function saveDetail(id) {
				const content = document.getElementById('config_detail_content').value;
				const res = await authFetch('/api/activity/' + id + '/detail', {
					method: 'PUT',
					headers: authHeaders(),
					body: JSON.stringify({ content }),
				});
				if (!res.ok) {
					toast('保存失败', 'error');
					return;
				}
				toast('详情已保存');
			}

			async function saveFormConfig(id) {
				const fields = document.getElementById('config_fields').value;
				try {
					JSON.parse(fields);
				} catch (e) {
					toast('JSON 格式错误: ' + e.message, 'error');
					return;
				}
				const body = {
					fields,
					instructions: document.getElementById('config_instructions').value,
					attachment: document.getElementById('config_attachment').checked ? 1 : 0,
				};
				const res = await authFetch('/api/activity/' + id + '/signup-form', {
					method: 'PUT',
					headers: authHeaders(),
					body: JSON.stringify(body),
				});
				if (!res.ok) {
					toast('保存失败', 'error');
					return;
				}
				toast('表单配置已保存');
			}

			async function loadSubmissions(id) {
				const res = await authFetch('/api/activity/' + id + '/submissions');
				const list = await res.json();
				const container = document.getElementById('submissions_list');
				if (!list || list.length === 0) {
					container.innerHTML = '<p class="config-empty">暂无报名数据</p>';
					return;
				}
				container.innerHTML = `<table><thead><tr><th>ID</th><th>提交时间</th><th>数据</th><th>附件</th></tr></thead>
					<tbody>${list.map((s) => {
						let dataStr = '';
						try {
							const d = JSON.parse(s.data);
							dataStr = Object.entries(d).map(([k, v]) => `${k}: ${v}`).join(' | ');
						} catch (e) {
							dataStr = s.data;
						}
						let files = [];
						try { files = JSON.parse(s.attachments); } catch (e) {}
						return `<tr>
							<td>${s.id}</td>
							<td class="sub-time">${s.submittedAt}</td>
							<td class="sub-data">${dataStr}</td>
							<td>${files.length ? files.map((f, i) => `<a href="${f}" target="_blank" class="sub-file">附件${files.length > 1 ? i + 1 : ''}</a>`).join('') : '—'}</td>
						</tr>`;
					}).join('')}</tbody></table>`;
			}

			async function loadTimeline() {
				const res = await authFetch('/api/timeline');
				const data = await res.json();
				const h = data.header || {};
				const events = data.events || [];
				const main = document.getElementById('main-content');
				main.innerHTML = `
					<div class="page-header"><h2>时间轴</h2><div style="display:flex;gap:8px">
					<button class="btn btn-ghost" onclick='editTimelineHeader(${JSON.stringify(h)})'>编辑标题</button>
					<button class="btn btn-primary" onclick="editTimelineEvent()">+ 新增事件</button></div></div>
					<div class="info-bar"><strong>${h.title || '—'}</strong><span>${h.subtitle || ''}</span></div>
					<table><thead><tr><th>图片</th><th>日期</th><th>标题</th><th>描述</th><th>标签</th><th>操作</th></tr></thead>
					<tbody>${events
						.map(
							(e) => `<tr>
					<td><img src="${e.image}" onerror="this.style.display='none'"></td>
					<td>${e.date}</td><td>${e.title}</td><td style="max-width:180px;color:var(--text-sub)">${e.description}</td><td style="color:var(--text-sub)">${e.label}</td>
					<td style="white-space:nowrap"><button class="btn btn-ghost" onclick='editTimelineEvent(${JSON.stringify(e)})'>编辑</button>
						<button class="btn btn-danger" style="margin-left:4px" onclick="delTimelineEvent(${e.id})">删除</button></td>
					</tr>`
						)
						.join('')}</tbody></table>`;
			}

			function editTimelineHeader(h) {
				openModal(
					'编辑时间轴标题',
					`
					<div class="form-group"><label>标题</label><input id="f_htitle" value="${h.title || ''}"></div>
					<div class="form-group"><label>副标题</label><input id="f_hsub" value="${h.subtitle || ''}"></div>`,
					async () => {
						const res = await authFetch('/api/timeline/header', {
							method: 'PUT',
							headers: authHeaders(),
							body: JSON.stringify({ title: val('f_htitle'), subtitle: val('f_hsub') }),
						});
						if (!res.ok) {
							toast('保存失败', 'error');
							return;
						}
						closeModal();
						toast('保存成功');
						loadTimeline();
					}
				);
			}

			function editTimelineEvent(e) {
				const isNew = !e;
				e = e || { date: '', title: '', description: '', image: '', label: '' };
				openModal(
					isNew ? '新增事件' : '编辑事件',
					`
					<div class="form-group"><label>日期</label><input id="f_edate" value="${e.date}"></div>
					<div class="form-group"><label>标题</label><input id="f_etitle" value="${e.title}"></div>
					<div class="form-group"><label>描述</label><textarea id="f_edesc">${e.description}</textarea></div>
					<div class="form-group"><label>标签文字</label><input id="f_elabel" value="${e.label}"></div>
					${imgUploadHTML('f_eimg', e.image, 'img/timeline')}`,
					async () => {
						const body = { date: val('f_edate'), title: val('f_etitle'), description: val('f_edesc'), image: val('f_eimg'), label: val('f_elabel') };
						const res = await authFetch(isNew ? '/api/timeline/events' : '/api/timeline/events/' + e.id, {
							method: isNew ? 'POST' : 'PUT',
							headers: authHeaders(),
							body: JSON.stringify(body),
						});
						if (!res.ok) {
							toast('操作失败', 'error');
							return;
						}
						closeModal();
						toast(isNew ? '创建成功' : '保存成功');
						loadTimeline();
					},
					[{ id: 'f_eimg', dir: 'img/timeline' }]
				);
			}

			async function delTimelineEvent(id) {
				if (!confirm('确定删除？')) return;
				const res = await authFetch('/api/timeline/events/' + id, { method: 'DELETE', headers: authHeaders() });
				if (!res.ok) {
					toast('删除失败', 'error');
					return;
				}
				toast('已删除');
				loadTimeline();
			}

			function markImgMissing(imgEl) {
				const src = imgEl.dataset.src || imgEl.getAttribute('src') || '';
				const ph = document.createElement('div');
				ph.className = 'img-missing card-img';
				const label = document.createElement('span');
				label.textContent = '图片缺失';
				const code = document.createElement('code');
				code.textContent = src;
				ph.appendChild(label);
				ph.appendChild(code);
				imgEl.replaceWith(ph);
			}

			async function loadGallery() {
				const res = await authFetch('/api/gallery');
				const list = await res.json();
				const main = document.getElementById('main-content');
				main.innerHTML = `<div class="page-header"><h2>画廊</h2><button class="btn btn-primary" onclick="editGallery()">+ 新增</button></div><div class="card-grid">${(
					list || []
				)
					.map(
						(g) => `<div class="card">
				<img class="card-img" src="${g.image}" data-src="${g.image}" onerror="markImgMissing(this)">
				<div class="card-body"><h3>${g.scene}</h3><p>画师: ${g.illustrator}</p><p>${g.description}</p></div>
				<div class="card-actions">
				<button class="btn btn-ghost" onclick='editGallery(${JSON.stringify(g)})'>编辑</button>
				<button class="btn btn-danger" onclick="delGallery(${g.id})">删除</button></div></div>`
					)
					.join('')}</div>`;
			}

			function editGallery(g) {
				const isNew = !g;
				g = g || { image: '', illustrator: '', scene: '', description: '' };
				openModal(
					isNew ? '新增画廊' : '编辑画廊',
					`
					<div class="form-group"><label>场景</label><input id="f_gscene" value="${g.scene}"></div>
					<div class="form-group"><label>画师</label><input id="f_gillus" value="${g.illustrator}"></div>
					<div class="form-group"><label>描述</label><textarea id="f_gdesc">${g.description}</textarea></div>
					${imgUploadHTML('f_gimg', g.image, 'img/Illustration')}`,
					async () => {
						const body = { image: val('f_gimg'), illustrator: val('f_gillus'), scene: val('f_gscene'), description: val('f_gdesc') };
						const res = await authFetch(isNew ? '/api/gallery' : '/api/gallery/' + g.id, {
							method: isNew ? 'POST' : 'PUT',
							headers: authHeaders(),
							body: JSON.stringify(body),
						});
						if (!res.ok) {
							toast('操作失败', 'error');
							return;
						}
						closeModal();
						toast(isNew ? '创建成功' : '保存成功');
						loadGallery();
					},
					[{ id: 'f_gimg', dir: 'img/Illustration' }]
				);
			}

			async function delGallery(id) {
				if (!confirm('确定删除？')) return;
				const res = await authFetch('/api/gallery/' + id, { method: 'DELETE', headers: authHeaders() });
				if (!res.ok) {
					toast('删除失败', 'error');
					return;
				}
				toast('已删除');
				loadGallery();
			}

			async function loadAbout() {
				const res = await authFetch('/api/about');
				const data = await res.json();
				const cards = data.cards || [];
				const main = document.getElementById('main-content');
				main.innerHTML = `<div class="page-header"><h2>关于我们</h2><button class="btn btn-primary" onclick="editAbout()">+ 新增</button></div>
    <div class="card-grid">${cards
			.map(
				(c) => `<div class="card">
						<img class="card-img" src="${c.image}" onerror="this.style.display='none'">
						<div class="card-body">
							<p style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:2px">${c.smallTitle}</p>
							<h3>${c.title}</h3><p>${c.content.substring(0, 80)}${c.content.length > 80 ? '...' : ''}</p></div>
						<div class="card-actions">
							<button class="btn btn-ghost" onclick='editAbout(${JSON.stringify(c).replace(/'/g, '&#39;')})'>编辑</button>
							<button class="btn btn-danger" onclick="delAbout(${c.id})">删除</button></div></div>`
			)
			.join('')}</div>`;
			}

			function editAbout(c) {
				const isNew = !c;
				c = c || { smallTitle: '', title: '', content: '', image: '' };
				openModal(
					isNew ? '新增卡片' : '编辑卡片',
					`
					<div class="form-group"><label>副标题 (英文)</label><input id="f_cst" value="${c.smallTitle}"></div>
					<div class="form-group"><label>主标题</label><input id="f_ctitle" value="${c.title}"></div>
					<div class="form-group"><label>内容 (支持 &lt;br /&gt; 换行)</label><textarea id="f_ccontent" style="min-height:120px">${c.content}</textarea></div>
					${imgUploadHTML('f_cimg', c.image, 'img/about')}`,
					async () => {
						const body = { smallTitle: val('f_cst'), title: val('f_ctitle'), content: val('f_ccontent'), image: val('f_cimg') };
						const res = await authFetch(isNew ? '/api/about' : '/api/about/' + c.id, {
							method: isNew ? 'POST' : 'PUT',
							headers: authHeaders(),
							body: JSON.stringify(body),
						});
						if (!res.ok) {
							toast('操作失败', 'error');
							return;
						}
						closeModal();
						toast(isNew ? '创建成功' : '保存成功');
						loadAbout();
					},
					[{ id: 'f_cimg', dir: 'img/about' }]
				);
			}

			async function delAbout(id) {
				if (!confirm('确定删除？')) return;
				const res = await authFetch('/api/about/' + id, { method: 'DELETE', headers: authHeaders() });
				if (!res.ok) {
					toast('删除失败', 'error');
					return;
				}
				toast('已删除');
				loadAbout();
			}

			async function loadMusic() {
				const res = await authFetch('/api/music');
				const list = await res.json();
				const main = document.getElementById('main-content');
				main.innerHTML = `<div class="page-header"><h2>音乐</h2><div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="editMusic()">+ 新增</button><button class="btn btn-ghost" onclick="batchImportMusic()">批量导入</button></div></div>
				<table><thead><tr><th>封面</th><th>歌曲名</th><th>歌手</th><th>BV号</th><th>时长</th><th>排序</th><th>操作</th></tr></thead>
				<tbody>${(list || [])
					.map(
						(t) => `<tr>
				<td><img src="${t.cover}" onerror="this.style.display='none'"></td>
				<td>${t.title}</td><td>${t.artist}</td><td style="font-size:12px;color:var(--text-sub)">${t.bvid || '—'}</td>
				<td>${t.duration ? Math.floor(t.duration / 60) + ':' + String(t.duration % 60).padStart(2, '0') : '—'}</td>
				<td>${t.sortOrder || 0}</td>
				<td style="white-space:nowrap"><button class="btn btn-ghost" onclick='editMusic(${JSON.stringify(t).replace(/'/g, '&#39;')})'>编辑</button>
					<button class="btn btn-danger" style="margin-left:4px" onclick="delMusic(${t.id})">删除</button></td>
				</tr>`
					)
					.join('')}</tbody></table>`;
			}

			function editMusic(t) {
				const isNew = !t;
				t = t || { bvid: '', title: '', artist: '', src: '', cover: '', duration: 0, sortOrder: 0 };
				openModal(
					isNew ? '新增歌曲' : '编辑歌曲',
					`
					<div class="form-group"><label>BV号</label><div style="display:flex;gap:8px"><input id="f_mbvid" value="${t.bvid || ''}" placeholder="BVxxxxxxxxxx"><button type="button" class="btn btn-ghost" onclick="fetchBVIDInfo()">自动填充</button></div></div>
					<div class="form-group"><label>歌曲名</label><input id="f_mtitle" value="${t.title}"></div>
					<div class="form-group"><label>歌手/UP主</label><input id="f_martist" value="${t.artist}"></div>
					<div class="form-group"><label>封面URL</label><input id="f_mcover" value="${t.cover}"></div>
					<div class="form-group"><label>时长(秒)</label><input id="f_mduration" type="number" value="${t.duration || 0}"></div>
					<div class="form-group"><label>排序</label><input id="f_msort" type="number" value="${t.sortOrder || 0}"></div>`,
					async () => {
						const body = {
							bvid: val('f_mbvid'),
							title: val('f_mtitle'),
							artist: val('f_martist'),
							src: '',
							cover: val('f_mcover'),
							duration: parseInt(val('f_mduration')) || 0,
							sortOrder: parseInt(val('f_msort')) || 0,
						};
						const res = await authFetch(isNew ? '/api/music' : '/api/music/' + t.id, {
							method: isNew ? 'POST' : 'PUT',
							headers: authHeaders(),
							body: JSON.stringify(body),
						});
						if (!res.ok) {
							toast('操作失败', 'error');
							return;
						}
						closeModal();
						toast(isNew ? '创建成功' : '保存成功');
						loadMusic();
					}
				);
			}

			async function fetchBVIDInfo() {
				const bvid = val('f_mbvid');
				if (!bvid) {
					toast('请先输入BV号', 'error');
					return;
				}
				try {
					const res = await authFetch('/api/bilibili/info?bvid=' + encodeURIComponent(bvid));
					if (!res.ok) {
						toast('获取失败', 'error');
						return;
					}
					const info = await res.json();
					if (info.error) {
						toast(info.error, 'error');
						return;
					}
					document.getElementById('f_mtitle').value = info.Title || '';
					document.getElementById('f_martist').value = info.Owner || '';
					document.getElementById('f_mcover').value = info.Cover || '';
					document.getElementById('f_mduration').value = info.Duration || 0;
					toast('已自动填充');
				} catch (e) {
					toast('获取失败', 'error');
				}
			}

			function batchImportMusic() {
				openModal(
					'批量导入 BV 号',
					`<div class="form-group"><label>BV号列表（每行一个）</label><textarea id="f_bvids" style="min-height:200px" placeholder="BVxxxxxxxxxx&#10;BVyyyyyyyyyy"></textarea></div>`,
					async () => {
						const text = val('f_bvids');
						const bvids = text
							.split(/[\n\r]+/)
							.map((s) => s.trim())
							.filter((s) => s.length > 0);
						if (!bvids.length) {
							toast('请至少输入一个BV号', 'error');
							return;
						}
						const res = await authFetch('/api/music/sync', {
							method: 'POST',
							headers: authHeaders(),
							body: JSON.stringify({ bvids }),
						});
						if (!res.ok) {
							toast('批量导入失败', 'error');
							return;
						}
						const data = await res.json();
						closeModal();
						toast('成功导入 ' + (data.added || 0) + ' 首歌曲');
						loadMusic();
					}
				);
			}

			async function delMusic(id) {
				if (!confirm('确定删除？')) return;
				const res = await authFetch('/api/music/' + id, { method: 'DELETE', headers: authHeaders() });
				if (!res.ok) {
					toast('删除失败', 'error');
					return;
				}
				toast('已删除');
				loadMusic();
			}

			let bilibiliPollTimer = null;

			async function loadBilibili() {
				if (bilibiliPollTimer) {
					clearInterval(bilibiliPollTimer);
					bilibiliPollTimer = null;
				}
				const main = document.getElementById('main-content');
				main.innerHTML = `<div class="page-header"><h2>B 站绑定</h2></div>
					<div class="bilibili-bind" id="bili-panel">
						<div class="bili-status" id="bili-status">检测中...</div>
					</div>`;
				try {
					const res = await authFetch('/api/bilibili/status');
					const data = await res.json();
					if (data.bound) {
						renderBilibiliBound(data.bili_uid);
					} else {
						startBilibiliBind();
					}
				} catch (e) {
					document.getElementById('bili-status').textContent = '状态获取失败';
				}
			}

			function renderBilibiliBound(uid) {
				const panel = document.getElementById('bili-panel');
				panel.innerHTML = `
					<div class="bili-status ok">已绑定 B 站账号 UID: <strong>${uid}</strong></div>
					<p style="color:var(--text-sub);font-size:13px;margin:12px 0">如发现主页"风控校验失败"或 cookie 失效，可重新扫码绑定。</p>
					<button class="btn btn-primary" onclick="startBilibiliBind()">重新绑定</button>`;
			}

			async function startBilibiliBind() {
				const panel = document.getElementById('bili-panel');
				panel.innerHTML = `<div class="bili-status">正在生成二维码...</div>`;
				try {
					const res = await authFetch('/api/bilibili/qrcode', { method: 'POST' });
					const data = await res.json();
					if (data.error || !data.qrcode_key) {
						panel.innerHTML = `<div class="bili-status err">${data.error || '二维码生成失败'}</div>
							<button class="btn btn-ghost" onclick="startBilibiliBind()">重试</button>`;
						return;
					}
					panel.innerHTML = `
						<div class="bili-qrcode-wrap">
							<img class="bili-qrcode" src="${data.qr_data_url}" alt="B站登录二维码">
							<div class="bili-status" id="bili-status">请使用 B 站手机 App 扫码登录</div>
						</div>`;
					pollBilibiliQrcode(data.qrcode_key);
				} catch (e) {
					panel.innerHTML = `<div class="bili-status err">二维码生成失败</div>
						<button class="btn btn-ghost" onclick="startBilibiliBind()">重试</button>`;
				}
			}

			function pollBilibiliQrcode(key) {
				const statusEl = () => document.getElementById('bili-status');
				const tick = async () => {
					try {
						const res = await authFetch('/api/bilibili/qrcode/status?key=' + encodeURIComponent(key));
						const data = await res.json();
						if (data.code === 0) {
							clearInterval(bilibiliPollTimer);
							bilibiliPollTimer = null;
							statusEl().textContent = '扫码成功，正在保存...';
							const biliUID = extractBiliUID(data.cookies);
							const bindRes = await authFetch('/api/bilibili/bind', {
								method: 'POST',
								headers: authHeaders(),
								body: JSON.stringify({
									refresh_token: data.refresh_token || '',
									cookies: data.cookies || '',
									bili_uid: biliUID,
								}),
							});
							if (!bindRes.ok) {
								statusEl().textContent = '保存失败';
								return;
							}
							toast('B 站绑定成功');
							renderBilibiliBound(biliUID || '已绑定');
						} else if (data.code === 86038) {
							clearInterval(bilibiliPollTimer);
							bilibiliPollTimer = null;
							const el = statusEl();
							if (el) el.textContent = '二维码已过期，请重试';
							const panel = document.getElementById('bili-panel');
							panel.innerHTML += `<button class="btn btn-ghost" onclick="startBilibiliBind()" style="margin-top:12px">重新生成二维码</button>`;
						} else if (data.code === 86090) {
							const el = statusEl();
							if (el) el.textContent = '已扫码，请在手机上确认登录';
						} else if (data.code === 86101) {
							const el = statusEl();
							if (el) el.textContent = '请使用 B 站 App 扫码';
						}
					} catch (e) {}
				};
				tick();
				bilibiliPollTimer = setInterval(tick, 2500);
			}

			function extractBiliUID(cookies) {
				if (!cookies) return '';
				const m = cookies.match(/DedeUserID=(\d+)/);
				return m ? m[1] : '';
			}

			function toggleSidebar(force) {
				const sb = document.getElementById('sidebar');
				const mask = document.getElementById('sidebar-mask');
				const open = force === undefined ? !sb.classList.contains('open') : force;
				sb.classList.toggle('open', open);
				mask.classList.toggle('show', open);
			}

			const loaders = { activity: loadActivity, timeline: loadTimeline, gallery: loadGallery, about: loadAbout, music: loadMusic, bilibili: loadBilibili };
			document.querySelectorAll('.sidebar a[data-tab]').forEach((a) => {
				a.addEventListener('click', () => {
					document.querySelectorAll('.sidebar a').forEach((x) => x.classList.remove('active'));
					a.classList.add('active');
					loaders[a.dataset.tab]();
					toggleSidebar(false);
				});
			});

			initApp();
		</script>
	</body>
</html>
